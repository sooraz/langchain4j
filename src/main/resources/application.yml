server:
  port: 8080

spring:
  application:
    name: rag-chaos-java
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    dev.langchain4j: DEBUG
    ai.staff.rag: DEBUG