server:
  port: 8080

spring:
  application:
    name: rag-chaos-java

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    dev.langchain4j: DEBUG
    com.yourpackage: DEBUG